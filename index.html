
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reseñas GM</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --ink: #0a0a0a;
      --muted: #888888;
      --border: #e8e8e8;
      --accent: #1a47ff;
      --radius: 2px;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: transparent;
      color: var(--ink);
      padding: 48px 24px;
      display: flex;
      justify-content: center;
    }

    .widget { width: 100%; max-width: 1000px; }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--ink);
    }

    .header-eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .header-title {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--ink);
    }

    .header-title span { color: var(--accent); }

    .header-score { display: flex; align-items: center; gap: 10px; }

    .score-num {
      font-size: 36px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .score-meta { display: flex; flex-direction: column; gap: 3px; }

    .star-row { display: flex; gap: 2px; }
    .star { color: var(--accent); font-size: 14px; }

    .score-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--card);
      padding: 28px 26px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
      transition: background 0.2s;
      min-height: 220px;
    }

    .card:hover { background: #fafafa; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.04s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.16s; }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-stars { display: flex; gap: 2px; }
    .card-stars .star { font-size: 12px; }

    .card-date {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink);
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .avatar {
      width: 32px;
      height: 32px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .author-name {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink);
    }

    .refresh-wrap {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      background: var(--ink);
      color: #fff;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-refresh:hover { background: var(--accent); }

    .btn-refresh svg {
      width: 13px; height: 13px;
      transition: transform 0.4s ease;
    }

    .btn-refresh:hover svg { transform: rotate(180deg); }

    .total-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .state-msg {
      grid-column: 1 / -1;
      padding: 48px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>
<body>
<div class="widget">

  <div class="header">
    <div class="header-left">
      <div class="header-eyebrow">Opiniones verificadas</div>
      <div class="header-title">Lo que dicen <span>nuestros clientes</span></div>
    </div>
    <div class="header-score">
      <div class="score-num">5.0</div>
      <div class="score-meta">
        <div class="star-row">
          <span class="star">★</span><span class="star">★</span>
          <span class="star">★</span><span class="star">★</span>
          <span class="star">★</span>
        </div>
        <div class="score-label" id="score-label">Cargando...</div>
      </div>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="state-msg">Cargando reseñas...</div>
  </div>

  <div class="refresh-wrap">
    <button class="btn-refresh" onclick="render()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.36-3.36L23 10M1 14l5.13 4.36A9 9 0 0020.49 15"/>
      </svg>
      Ver otras reseñas
    </button>
    <span class="total-label" id="total-label"></span>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://xrxgpxgowrpghvbtxgfn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyeGdweGdvd3JwZ2h2YnR4Z2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2NjUxNTEsImV4cCI6MjA4NDI0MTE1MX0.MUeGfSb7S1kzBABPKnjM1qubXFBf0OwzF5V0PGP72Kk';
  const VISIBLE = 3;
  let allReviews = [];

  async function fetchReviews() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/reviews?approved=eq.true&select=*&order=created_at.desc`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      if (!res.ok) throw new Error();
      allReviews = await res.json();
      const n = allReviews.length;
      document.getElementById('score-label').textContent =
        n > 0 ? `${n} opinión${n !== 1 ? 'es' : ''} verificada${n !== 1 ? 's' : ''}` : 'Opiniones verificadas';
      document.getElementById('total-label').textContent =
        n > VISIBLE ? `Mostrando 3 de ${n} reseñas` : '';
      render();
    } catch {
      document.getElementById('grid').innerHTML = `<div class="state-msg">Error al cargar las reseñas.</div>`;
      document.getElementById('score-label').textContent = 'Opiniones verificadas';
    }
  }

  function stars(n) {
    return Array(Math.min(5, Math.max(1, n || 5))).fill('<span class="star">★</span>').join('');
  }

  function initials(name) {
    if (!name) return '?';
    return name.trim().split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('es-ES', { year: 'numeric', month: 'long' });
  }

  function render() {
    const grid = document.getElementById('grid');
    if (!allReviews.length) {
      grid.innerHTML = `<div class="state-msg">Aún no hay reseñas aprobadas.</div>`;
      return;
    }
    const picked = shuffle(allReviews).slice(0, VISIBLE);
    grid.innerHTML = picked.map(r => `
      <div class="card">
        <div class="card-top">
          <div class="card-stars">${stars(r.rating)}</div>
          ${r.date ? `<span class="card-date">${formatDate(r.date)}</span>` : ''}
        </div>
        <p class="card-text">${r.text}</p>
        <div class="card-footer">
          <div class="avatar">${initials(r.author_name)}</div>
          <span class="author-name">${r.author_name || 'Cliente'}</span>
        </div>
      </div>
    `).join('');
  }

  fetchReviews();
</script>
</body>
</html>
