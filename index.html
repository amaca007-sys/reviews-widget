
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reseñas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --card: #ffffff;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #c8a96e;
      --accent-light: #f0e8d8;
      --shadow: 0 2px 20px rgba(0,0,0,0.07);
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .widget {
      width: 100%;
      max-width: 960px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .header-label::before,
    .header-label::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    .header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.2;
    }

    .header h2 em {
      font-style: italic;
      color: var(--accent);
    }

    .global-stars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
    }

    .star-row { display: flex; gap: 3px; }
    .star { color: var(--accent); font-size: 18px; }

    .global-score {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 26px 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(200,169,110,0.12);
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.5s ease forwards;
      transition: box-shadow 0.25s, transform 0.25s;
    }

    .card:hover {
      box-shadow: 0 8px 36px rgba(0,0,0,0.11);
      transform: translateY(-3px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }
    .card:nth-child(5) { animation-delay: 0.33s; }
    .card:nth-child(6) { animation-delay: 0.40s; }

    .card-stars { display: flex; gap: 3px; }
    .card-stars .star { font-size: 14px; }

    .card-quote {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-style: italic;
      line-height: 1.65;
      color: var(--ink);
      flex: 1;
      position: relative;
      padding-left: 18px;
    }

    .card-quote::before {
      content: '\201C';
      position: absolute;
      left: 0;
      top: -4px;
      font-size: 32px;
      line-height: 1;
      color: var(--accent);
      font-style: normal;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--accent-light);
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
      font-family: 'Playfair Display', serif;
    }

    .author-info { display: flex; flex-direction: column; gap: 2px; }

    .author-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }

    .author-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .refresh-wrap {
      text-align: center;
      margin-top: 36px;
    }

    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border: 1.5px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-refresh:hover { background: var(--accent); color: #fff; }

    .btn-refresh svg {
      width: 15px; height: 15px;
      transition: transform 0.4s ease;
    }

    .btn-refresh:hover svg { transform: rotate(180deg); }

    /* Estado vacío y error */
    .state-msg {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 14px;
      grid-column: 1 / -1;
    }

    .state-msg .icon { font-size: 32px; margin-bottom: 12px; }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="widget">

  <div class="header">
    <div class="header-label">Opiniones verificadas</div>
    <h2>Lo que dicen <em>nuestros clientes</em></h2>
    <div class="global-stars">
      <div class="star-row">
        <span class="star">★</span><span class="star">★</span>
        <span class="star">★</span><span class="star">★</span>
        <span class="star">★</span>
      </div>
      <span class="global-score" id="score-label">Cargando reseñas...</span>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="state-msg">
      <div class="icon">⏳</div>
      Cargando reseñas...
    </div>
  </div>

  <div class="refresh-wrap">
    <button class="btn-refresh" onclick="render()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.36-3.36L23 10M1 14l5.13 4.36A9 9 0 0020.49 15"/>
      </svg>
      Ver otras reseñas
    </button>
  </div>

</div>

<script>
  // ── Configuración Supabase ──────────────────────────────────────────
  const SUPABASE_URL = 'https://xrxgpxgowrpghvbtxgfn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyeGdweGdvd3JwZ2h2YnR4Z2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2NjUxNTEsImV4cCI6MjA4NDI0MTE1MX0.MUeGfSb7S1kzBABPKnjM1qubXFBf0OwzF5V0PGP72Kk';

  // Cuántas reseñas mostrar a la vez
  const VISIBLE = 3;

  // ── Cache local ─────────────────────────────────────────────────────
  let allReviews = [];

  // ── Fetch desde Supabase ────────────────────────────────────────────
  async function fetchReviews() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/reviews?approved=eq.true&select=*`,
        {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          }
        }
      );

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allReviews = await res.json();

      // Actualiza el contador global
      const label = document.getElementById('score-label');
      label.textContent = allReviews.length > 0
        ? `5.0 · ${allReviews.length} opinión${allReviews.length !== 1 ? 'es' : ''} verificada${allReviews.length !== 1 ? 's' : ''}`
        : 'Opiniones verificadas';

      render();

    } catch (err) {
      console.error('Error cargando reseñas:', err);
      document.getElementById('grid').innerHTML = `
        <div class="state-msg">
          <div class="icon">⚠️</div>
          No se pudieron cargar las reseñas en este momento.
        </div>`;
      document.getElementById('score-label').textContent = 'Opiniones verificadas';
    }
  }

  // ── Helpers ─────────────────────────────────────────────────────────
  function stars(n) {
    return Array(Math.min(5, Math.max(1, n)))
      .fill('<span class="star">★</span>').join('');
  }

  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('es-ES', { year: 'numeric', month: 'long' });
  }

  // ── Render ───────────────────────────────────────────────────────────
  function render() {
    const grid = document.getElementById('grid');

    if (allReviews.length === 0) {
      grid.innerHTML = `
        <div class="state-msg">
          <div class="icon">💬</div>
          Aún no hay reseñas aprobadas.
        </div>`;
      return;
    }

    const picked = shuffle(allReviews).slice(0, VISIBLE);

    grid.innerHTML = picked.map(r => `
      <div class="card">
        <div class="card-stars">${stars(r.rating)}</div>
        <p class="card-quote">${r.text}</p>
        <div class="card-footer">
          <div class="avatar">${initials(r.author_name)}</div>
          <div class="author-info">
            <span class="author-name">${r.author_name || 'Cliente'}</span>
            <span class="author-meta">${r.date ? formatDate(r.date) : 'Opinión verificada'}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── Init ─────────────────────────────────────────────────────────────
  fetchReviews();
</script>
</body>
</html>
